name: DCO

on:
  pull_request:
    branches: ["main", "dev"]

jobs:
  dco:
    name: DCO Sign-off Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check DCO sign-off
        uses: dco-org/check-dco@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
