name: Performance Benchmarks

on:
  schedule:
    # Weekly on Sunday at 06:00 UTC
    - cron: '0 6 * * 0'
  workflow_dispatch:
    inputs:
      upload_history:
        description: 'Upload result to perf-history branch'
        required: false
        default: 'true'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  bench:
    name: Run benchmarks (RV64)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
          components: rust-src

      - name: Install QEMU
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q qemu-system-misc

      - name: Restore perf history
        uses: actions/cache/restore@v4
        with:
          path: perf-results/
          # Unique key per run so save always writes; restore-keys picks the newest match.
          key: perf-results-${{ github.run_id }}
          restore-keys: perf-results-

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build init + bench cells
        run: |
          cargo build --release \
            --target riscv64gc-unknown-none-elf \
            -Z build-std=core,alloc \
            -p app-init \
            -p app-bench

      - name: Rebuild kernel with bench-aware init
        env:
          RUSTFLAGS: "-C relocation-model=pic"
        run: |
          REL=target/riscv64gc-unknown-none-elf/release
          # Refresh the embedded init binary from the just-built source so the kernel
          # auto-spawns /bin/bench from the cell table on the bench disk.
          cp "$REL/app-init" kernel/src/embedded/init
          # Regenerate kernel_fs.img with the fresh init.
          python3 tools/mkfat32.py kernel/src/embedded/kernel_fs.img \
            kernel/src/embedded/init   /bin/init \
            kernel/src/embedded/shell  /bin/shell \
            kernel/src/embedded/vfs    /bin/vfs \
            kernel/src/embedded/config /bin/config
          cargo build --release \
            --target riscv64gc-unknown-none-elf \
            -Z build-std=core,alloc \
            -p vicell-kernel

      - name: Generate bench disk image
        run: |
          # Cell-table-only disk: /bin/bench at CELL_TABLE_BASE_LBA.
          # Kernel is passed directly as -kernel; no Limine/FAT partition needed.
          bash scripts/gen-bench-disk.sh \
            target/riscv64gc-unknown-none-elf/release/app-bench \
            bench-disk.img

      - name: Boot QEMU and capture bench output
        id: bench_run
        timeout-minutes: 10
        run: |
          KERNEL=target/riscv64gc-unknown-none-elf/release/vicell-kernel
          # Direct boot: kernel ELF passed as -kernel (OpenSBI → kernel → init → bench).
          # bench-disk.img contains only the cell bootstrap table (/bin/bench).
          # init reads the cell table and auto-spawns /bin/bench.
          #
          # Capture [bench]/[rt] human-readable lines and bare JSON result lines.
          # print_report emits "[bench] ..." — used for PDR FAIL check.
          # print_json  emits '{"name":...}' with no prefix — used for results JSON.
          OUTPUT=$(timeout 300 qemu-system-riscv64 \
            -machine virt \
            -nographic \
            -bios default \
            -kernel "$KERNEL" \
            -m 256M \
            -drive file=bench-disk.img,format=raw,id=hd0,if=none \
            -device virtio-blk-device,drive=hd0 \
            2>&1 | grep -E '^\[bench\]|^\[rt\]|^\{"name":|^\[boot\] kernel_phys_base' || true)

          # bench_output: [bench] and [rt] lines — FAIL in either fails the PDR check below
          BENCH_LINES=$(echo "$OUTPUT" | grep -E '^\[bench\]|^\[rt\]' || true)
          echo "bench_output<<EOF" >> "$GITHUB_OUTPUT"
          echo "$BENCH_LINES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          # Extract JSON lines from the combined output buffer.
          JSON_LINES=$(echo "$OUTPUT" | grep '^{"name":' || echo '[]')
          echo "bench_json<<EOF" >> "$GITHUB_OUTPUT"
          echo "$JSON_LINES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Write result file
        run: |
          DATE=$(date -u +%Y-%m-%d)
          mkdir -p perf-results
          RESULT_FILE="perf-results/perf-${DATE}.json"
          JSON_LINES='${{ steps.bench_run.outputs.bench_json }}'
          printf '{\n  "date": "%s",\n  "commit": "%s",\n  "results": [%s]\n}\n' \
            "$DATE" \
            "${{ github.sha }}" \
            "$JSON_LINES" > "$RESULT_FILE"
          echo "[perf] Result written to $RESULT_FILE"
          cat "$RESULT_FILE"

      - name: Upload benchmark artifact
        uses: actions/upload-artifact@v4
        with:
          name: bench-results-${{ github.run_id }}
          path: perf-results/
          retention-days: 90

      - name: Save perf history
        uses: actions/cache/save@v4
        if: always()
        with:
          path: perf-results/
          key: perf-results-${{ github.run_id }}

      - name: Compare against historical baseline
        run: |
          bash scripts/compare-bench-results.sh perf-results/

      - name: Check PDR targets
        run: |
          OUTPUT="${{ steps.bench_run.outputs.bench_output }}"
          if echo "$OUTPUT" | grep -q "FAIL"; then
            echo "::error::One or more benchmarks exceed PDR targets — see bench output above"
            echo "$OUTPUT"
            exit 1
          else
            echo "[perf] All PDR targets met"
          fi
