[package]
name = "service-vfs"
version = "0.1.0"
edition = "2021"

[dependencies]
types = { path = "../../../libs/types" }
api = { path = "../../../libs/api" }
ostd = { path = "../../../libs/ostd" }
driver-disk = { path = "../../drivers/disk" }
fatfs = { git = "https://github.com/rafalh/rust-fatfs", default-features = false, features = ["alloc"] }
littlefs2 = { version = "0.7.2", default-features = false }

[features]
# Shrinks the per-cell quota to a tiny limit so the vfs-test cell can exercise
# quota enforcement (Err 2) without writing the full 32 MB production limit.
# Enabled ONLY for the integration-test kernel build — never in production.
test-hooks = []

[[bin]]
name = "service-vfs"
path = "src/main.rs"
