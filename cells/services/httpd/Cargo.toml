[package]
name = "service-httpd"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "service-httpd"
path = "src/main.rs"

[dependencies]
ostd     = { path = "../../../libs/ostd" }
api      = { path = "../../../libs/api" }
# httparse: no_std HTTP/1.1 request parser (no edge-http: embedded-io-async 0.6 vs workspace 0.7 conflict)
httparse   = { version = "1", default-features = false }
serde      = { version = "1", default-features = false, features = ["derive"] }
serde_json = { version = "1", default-features = false, features = ["alloc"] }

[build-dependencies]
cell-build = { path = "../../../libs/cell-build" }
