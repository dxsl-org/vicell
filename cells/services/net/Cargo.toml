[package]
name = "service-net"
version = "0.1.0"
edition = "2021"

[dependencies]
types  = { path = "../../../libs/types" }
api    = { path = "../../../libs/api" }
ostd   = { path = "../../../libs/ostd" }
smoltcp = { version = "0.11", default-features = false, features = [
    "alloc",
    "socket-tcp",
    "socket-udp",
    "socket-dhcpv4",
    "socket-icmp",
    "proto-ipv4",
    "proto-dhcpv4",
] }

[[bin]]
name = "service-net"
path = "src/main.rs"
