[package]
name = "service-net"
version = "0.1.0"
edition = "2021"

[dependencies]
types  = { path = "../../../libs/types" }
api    = { path = "../../../libs/api" }
ostd   = { path = "../../../libs/ostd" }
embedded-tls      = { version = "0.19", default-features = false, features = ["alloc"] }
embedded-io       = { version = "0.7",  default-features = false }
embedded-io-async = { version = "0.7",  default-features = false }
rand_core         = { version = "0.6",  default-features = false }
rand_chacha       = { version = "0.3",  default-features = false }
smoltcp = { version = "0.11", default-features = false, features = [
    "alloc",
    "socket-tcp",
    "socket-udp",
    "socket-dhcpv4",
    "socket-icmp",
    "proto-ipv4",
    "proto-dhcpv4",
    "proto-igmp",
] }

[[bin]]
name = "service-net"
path = "src/main.rs"
