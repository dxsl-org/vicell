[build]
target = "riscv64gc-unknown-none-elf"

[target.x86_64-unknown-none]
rustflags = [
    "-C", "code-model=kernel",
    "-C", "target-feature=-red-zone",
    # Static (non-PIE) is required: the Limine loader panics when LOAD segments
    # with different permissions share a page — PIE generates extra .dynamic/.got
    # segments that cause exactly this overlap.
    "-C", "relocation-model=static",
]

[target.riscv64gc-unknown-none-elf]
# Linker script is provided by build.rs.
#
# NOTE: `relocation-model=pic` is REQUIRED for the `-pie` kernel to link, but it
# must NOT be set here — a global rustflag also compiles Cells as PIC
# (GOT-indirect data access). Cells have no self-relocation and the cell loader
# only applies R_RISCV_RELATIVE, so PIC Cells read NULL for .data constants at
# runtime (empty strings, etc.). PIC is therefore scoped to the KERNEL build
# only, via `RUSTFLAGS="-C relocation-model=pic"` (see run.ps1 and CI perf.yml).
