[package]
name = "hal-riscv"
version = "0.2.0"
edition = "2021"
license = "MPL-2.0"

[dependencies]
hal-arch-trait  = { path = "../../traits/arch" }
hal-uart        = { path = "../../traits/uart" }
hal-timer       = { path = "../../traits/timer" }
hal-interrupt   = { path = "../../traits/interrupt" }
hal-paging      = { path = "../../traits/paging" }
hal-hypervisor  = { path = "../../traits/hypervisor" }
types = { path = "../../../libs/types" }
riscv = "0.16.0"
critical-section = { version = "1", optional = true, features = ["restore-state-usize"] }

[build-dependencies]
cc = "1.0"

[features]
default = []
critical-section-impl = ["dep:critical-section"]

[lib]
crate-type = ["rlib"]
